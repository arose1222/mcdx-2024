<template>
    <lightning-card title="Territory Management Dashboard" icon-name="standard:account">
        <div slot="actions">
            <lightning-button 
                label="Refresh" 
                icon-name="utility:refresh" 
                onclick={handleRefresh}
                disabled={isLoading}>
            </lightning-button>
        </div>

        <div class="slds-p-around_medium">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>

            <template if:false={isLoading}>
                <template if:true={hasData}>
                    <!-- Summary Cards -->
                    <div class="slds-grid slds-wrap slds-gutters">
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                            <div class="slds-box slds-theme_default metric-card">
                                <div class="metric-value">{stats.totalAccounts}</div>
                                <div class="metric-label">Total Accounts</div>
                            </div>
                        </div>
                        
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                            <div class="slds-box slds-theme_success metric-card clickable" 
                                 data-status="Active" 
                                 onclick={handleStatusClick}>
                                <div class="metric-value">{stats.activeAccounts}</div>
                                <div class="metric-label">Active</div>
                            </div>
                        </div>
                        
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                            <div class="slds-box slds-theme_warning metric-card clickable" 
                                 data-status="Pending Review" 
                                 onclick={handleStatusClick}>
                                <div class="metric-value">{stats.pendingAccounts}</div>
                                <div class="metric-label">Pending Review</div>
                            </div>
                        </div>
                        
                        <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-4">
                            <div class="slds-box metric-card clickable" 
                                 data-status="Draft" 
                                 onclick={handleStatusClick}>
                                <div class="metric-value">{stats.draftAccounts}</div>
                                <div class="metric-label">Draft</div>
                            </div>
                        </div>
                    </div>

                    <!-- Territory List -->
                    <div class="slds-m-top_large">
                        <h2 class="slds-text-heading_medium slds-m-bottom_small">Territories</h2>
                        <template if:true={territories}>
                            <lightning-datatable
                                key-field="territoryCode"
                                data={territories}
                                columns={territoryColumns}
                                hide-checkbox-column>
                            </lightning-datatable>
                        </template>
                    </div>

                    <!-- Filtered Accounts -->
                    <template if:true={hasFilteredAccounts}>
                        <div class="slds-m-top_large">
                            <h2 class="slds-text-heading_medium slds-m-bottom_small">
                                Accounts - {selectedStatus}
                            </h2>
                            <lightning-datatable
                                key-field="Id"
                                data={filteredAccounts}
                                columns={accountColumns}
                                hide-checkbox-column>
                            </lightning-datatable>
                        </div>
                    </template>
                </template>

                <template if:false={hasData}>
                    <div class="slds-text-align_center slds-p-around_large">
                        <p class="slds-text-body_regular">No territory data available</p>
                    </div>
                </template>
            </template>
        </div>
    </lightning-card>
</template>
